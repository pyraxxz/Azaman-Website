    <!--
      SPA redirect decoder - pairs with public/404.html. If we landed via
      the GitHub Pages 404 fallback, our path was encoded into ?p=/...,
      so we decode it back into a real URL before React Router boots. No
      reload, no flash. Source: github.com/rafgraph/spa-github-pages (MIT).
    -->
    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
