<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azaman</title>
    <!--
      GitHub Pages SPA fallback (Rafael Pedicini's spa-github-pages technique,
      MIT-licensed). When a direct hit on /vendors (or any non-root path)
      lands here, we rewrite the URL into a query-string the index page can
      decode and hand to React Router. Keeps deep links working with no
      server-side rewrites.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
